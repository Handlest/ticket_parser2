# ============================================================================
# Единый файл конфигурации приложения.
# Значения вида ${VAR} подставляются из переменных окружения (см. .env).
# Подробное описание каждого поля — в docs/configuration.md
# ============================================================================

telegram:
  # Токен берётся из переменной окружения TELEGRAM_BOT_TOKEN (файл .env).
  token: "${TELEGRAM_BOT_TOKEN}"
  # Список Telegram user_id, которым разрешён доступ. Берётся из переменной
  # окружения ALLOWED_USER_IDS (файл .env): "111,222". Пусто = доступ всем.
  # Узнать свой id можно у бота @userinfobot.
  allowed_user_ids: "${ALLOWED_USER_IDS}"

database:
  # Путь к файлу SQLite. Каталог data/ монтируется как volume в docker-compose.
  path: "data/tracking.db"

scheduler:
  # Интервал проверки по умолчанию (предлагается пользователю при добавлении).
  default_check_interval_minutes: 60
  # Минимально допустимый интервал — защита от слишком частых запросов к сайтам.
  # Также задаёт частоту "тика" планировщика.
  min_interval_minutes: 15

providers:
  # Какие провайдеры-сайты активны. Имена соответствуют зарегистрированным
  # провайдерам в app/providers/ (см. docs/providers.md).
  enabled:
    - s7
    - redwing
  # Таймаут на один запрос/рендеринг страницы, секунды.
  request_timeout_seconds: 30
  # Запускать браузер (Playwright) в headless-режиме. На сервере — всегда true.
  headless: true

locale:
  # Валюта и язык. По умолчанию рубли / русский.
  currency: "RUB"
  language: "ru"

search_log:
  # Записывать ли результаты каждого похода на сайт: все найденные билеты и
  # минимальную цену. false = не вести лог поисков.
  enabled: true
  # Отдельный файл лога поисков. Пусто = писать в общий лог/консоль.
  # Ротация — как у logging (5 МБ на файл, 3 архивные копии).
  file: "data/logs/searches.log"

logging:
  level: "INFO"
  # Файл со всеми логами (каталог в data/ сохраняется как volume). Пусто = не писать.
  file: "data/logs/app.log"
  # Отдельный файл только для ошибок (ERROR и выше).
  error_file: "data/logs/errors.log"
  # Ротация: максимальный размер файла и число архивных копий.
  max_file_size_mb: 5
  backup_count: 3
